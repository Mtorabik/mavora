<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mavora</title>
<style>
  :root{ --accent:#18A06A; --ink:#16201B; --muted:#5B6B63; --bg:#FFFFFF; --soft:#F4F8F6; --line:#E4ECE8; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--soft);-webkit-font-smoothing:antialiased}
  .card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:44px 38px;max-width:440px;width:90%;text-align:center;box-shadow:0 10px 40px rgba(24,160,106,.08)}
  .brand{display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:26px;letter-spacing:-.02em}
  .dot{width:14px;height:14px;border-radius:50%;background:var(--accent)}
  p{color:var(--muted);margin:14px 0 26px}
  .links{display:flex;flex-direction:column;gap:12px}
  a{display:block;padding:14px;border-radius:12px;font-weight:700;text-decoration:none;border:1px solid var(--line);color:var(--ink)}
  a.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  a:hover{opacity:.92}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="dot"></span> Mavora</div>
    <p>Your private AI CFO &amp; cheque manager.</p>
    <div class="links">
      <a class="primary" href="support.html">Support</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
